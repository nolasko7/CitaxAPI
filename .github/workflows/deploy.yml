name: Deploy Backend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y subir imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/citax-backend:latest

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/citax-backend:latest
            docker stop citax-backend || true
            docker rm citax-backend || true
            docker run -d \
              --name citax-backend \
              --restart unless-stopped \
              --network citax-network \
              -p 3000:3000 \
              --env-file /home/ec2-user/citax.env \
              -e APP_VERSION=${{ github.sha }} \
              ghcr.io/${{ github.repository_owner }}/citax-backend:latest
              
            docker image prune -f